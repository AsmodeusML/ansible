---
- name: Install and Configure Cockpit on Ubuntu
  hosts: all
  become: yes  # This allows the playbook to use sudo on the managed nodes
  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600 # Update cache if older than 1 hour

    - name: Install the main Cockpit package
      apt:
        name: cockpit
        state: present

    - name: Ensure Cockpit service is enabled and started
      systemd:
        name: cockpit.socket
        state: started
        enabled: yes

    - name: Allow Cockpit port (9090/tcp) through UFW firewall (if active)
      community.general.ufw:
        rule: allow
        port: '9090'
        proto: tcp
      ignore_errors: true # In case UFW is not installed or enabled

    - name: Display Cockpit access URL
      debug:
        msg: "Cockpit installed. Access it at https://localhost:9090"
