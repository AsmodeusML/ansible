---
- name: Install Docker Engine
  hosts: localhost
  become: true

  tasks:
    - name: Update and upgrade APT packages
      ansible.builtin.apt:
        update_cache: true

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Add Docker's official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: 644

    - name: Set up Docker stable repository
      ansible.builtin.apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable $(dpkg --print-architecture) /etc/apt/keyrings/docker.asc
        state: present
        filename: /etc/apt/sources.list.d/docker.sources

    - name: Update APT package index after adding Docker repository
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker CE
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add user to the Docker group
      ansible.builtin.user:
        name: "asmodeus"
        groups: docker
        append: true
